name: Auto Font Post
on:
  push:
    paths:
      - 'fonts/**/*.woff2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout font-auto-blog
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Checkout whyno_freefont
        uses: actions/checkout@v3
        with:
          repository: whyno2617/whyno_freefont
          token: ${{ secrets.GH_PAT }}
          path: whyno_freefont

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai google-api-python-client google-auth-oauthlib google-auth requests beautifulsoup4

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: whyno2617/whyno_freefont
        run: python post.py
